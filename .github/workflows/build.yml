name: build ZMK
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      debug_build:
        description: Build debug firmware with USB logging
        required: false
        default: false
        type: boolean

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_build == 'true' && 'build-debug.yaml' || 'build.yaml' }}
